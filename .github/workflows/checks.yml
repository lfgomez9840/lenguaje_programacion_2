name: Checks on Tags

on:
  push:
    tags:
      - "v*"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r Taller2_Facturacion/backend/requirements.txt
          pip install httpx

      - name: Run Ruff
        run: ruff check Taller2_Facturacion/ --fix

      - name: Run Pytest
        run: pytest Taller2_Facturacion/tests/ -v