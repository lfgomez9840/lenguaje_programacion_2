[pytest]
# Configuración de pytest para el proyecto Tienda de Muebles
# Permite que el código fuente en src/ sea importable desde las pruebas.
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Usar importlib evita conflictos por nombres de archivos de prueba repetidos.
addopts =
    -v
    --import-mode=importlib
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
